<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDEN</title>
  <meta http-equiv="refresh" content="5.5; url=eden-top.html">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @font-face {
  font-family: "KokuGothicLight";
  src: url("font_1_kokugl_1.15_rls.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
}
    
    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: "KokuGothicLight", "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
    }

    .message {
      text-align: center;
      line-height: 1.8;
      letter-spacing: 0.12em;
      animation: wholeFade 4.8s ease forwards;
    }

    .line1 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      margin-bottom: 0.2em;
      min-height: 1.8em;
      letter-spacing: 0;
    }

    .line2 {
      font-size: clamp(2rem, 4.4vw, 3.4rem);
      min-height: 1.8em;
      opacity: 0;
      animation: line2Show 0.6s ease forwards;
      animation-delay: 2.4s;
      transform: translateX(0.12em);
    }

    .line2-text {
     display: inline-block;
     transform: translateX(0.12em);
     }
    
    .char {
      opacity: 0;
      display: inline-block;
      animation: charFade 0.7s ease forwards;
      margin-right: -0.08em;
    }

    .char:nth-child(1) { animation-delay: 0.2s; }
    .char:nth-child(2) { animation-delay: 0.6s; }
    .char:nth-child(3) { animation-delay: 1.0s; }
    .char:nth-child(4) { animation-delay: 1.4s; }

 @keyframes charFade {
  0% {
    opacity: 0;
    transform: translateY(10px);
    filter: blur(6px);
  }
  60% {
    opacity: 0.7;
    transform: translateY(4px);
    filter: blur(2px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }
}

    @keyframes line2Show {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes wholeFade {
      0% {
        opacity: 1;
      }
      80% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="message">
    <div class="line1">
      <span class="char">よ</span>
      <span class="char">う</span>
      <span class="char">こ</span>
      <span class="char">そ</span>
    </div>
    <div class="line2"><span class="line2-text">EDENへ</span></div>
  </div>
</body>
</html>
