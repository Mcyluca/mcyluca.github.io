<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDEN</title>
 <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #efefef;
    --line: #d8d3ce;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 40px;
    padding-bottom: 80px;
    padding-left: 24px;
    padding-right: 24px;
  }

 .tower-link {
  display: block;
  width: min(100%, 520px);
  line-height: 0;
  text-decoration: none;
  border: 1px solid var(--line);
  background: #fff;
}

.tower-link img {
  display: block;
  width: 100%;
  height: auto;
  cursor: pointer;
}

  .tower-link:hover {
    opacity: 0.97;
  }

  @media screen and (max-width: 600px) {
    body {
      padding-top: 24px;
      padding-bottom: 40px;
      padding-left: 16px;
      padding-right: 16px;
    }

    .tower-link img {
      width: min(100%, 420px);
    }
  }
</style>
</head>
<body>
  <a href="eden-top.html" class="tower-link">
    <img src="e-tower1.png" alt="EDENタワー">
  </a>
</body>
</html>
