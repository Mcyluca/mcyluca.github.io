<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDEN</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #efefef;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .tower-link {
      display: block;
      line-height: 0;
      text-decoration: none;
    }

    .tower-link img {
      display: block;
      max-width: min(70vw, 420px);
      max-height: calc(100vh - 48px);
      width: auto;
      height: auto;
      cursor: pointer;
    }

    .tower-link:hover img {
      opacity: 0.96;
    }

    @media screen and (max-width: 600px) {
      body {
        padding: 16px;
      }

      .tower-link img {
        max-width: min(88vw, 420px);
        max-height: calc(100vh - 32px);
      }
    }
  </style>
</head>
<body>
  <a href="eden-top.html" class="tower-link">
    <img src="e-tower1.png" alt="EDENタワー">
  </a>
</body>
</html>
