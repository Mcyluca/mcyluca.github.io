<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDEN</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
    }

    .tower-wrap {
      position: relative;
      width: 100%;
      line-height: 0;
    }

    .tower-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* 入口リンク */
    .entrance-link {
      position: absolute;
      left: 46%;
      top: 83%;
      width: 8%;
      height: 7%;
      transform: translateX(-50%);
      display: block;
      cursor: pointer;
    }

    /* PCで位置確認しやすいように、必要なら一時的に使う
    .entrance-link {
      background: rgba(255, 0, 0, 0.25);
    }
    */

    @media screen and (max-width: 600px) {
      .entrance-link {
        left: 46%;
        top: 83%;
        width: 12%;
        height: 8%;
      }
    }
  </style>
</head>
<body>
  <div class="tower-wrap">
    <img src="e-tower1.png" alt="EDENタワー">
    <a href="eden-top.html" class="entrance-link" aria-label="EDENへ入る"></a>
  </div>
</body>
</html>
