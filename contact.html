<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>問い合わせ - 置き所</title>
  <style>
    @font-face {
      font-family: "KokuGothicLight";
      src: url("font_1_kokugl_1.15_rls.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg: #efefef;
      --text: #2f2b28;
      --sub: #5a5450;
      --line: #bfb8b2;
      --panel: #f4f4f4;
      --link-hover: #7a726b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Yu Gothic", "YuGothic", sans-serif;
      line-height: 1.8;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 28px 100px;
    }

    .page-title {
      text-align: center;
      font-size: 36px;
      font-weight: 400;
      letter-spacing: 0.08em;
      margin: 0 0 36px;
      font-family: "KokuGothicLight", "Hiragino Sans", "Yu Gothic", sans-serif;
    }

.back-link {
  display: inline-block;
  margin-bottom: 36px;
  font-size: 16px;
  color: var(--sub);
  font-family: "KokuGothicLight", "Hiragino Sans", "Yu Gothic", sans-serif;
}

    .contact-form {
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: left;
      font-family: "Yu Gothic", "YuGothic", sans-serif;
    }

    .contact-form label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 20px;
      color: var(--text);
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font-size: 18px;
      font-family: "Yu Gothic", "YuGothic", sans-serif;
      outline: none;
    }

    .contact-form textarea {
      resize: vertical;
      min-height: 180px;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: #9f978f;
    }

    .contact-form button {
      align-self: center;
      min-width: 160px;
      padding: 12px 24px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font-size: 20px;
      font-family: "KokuGothicLight", "Hiragino Sans", "Yu Gothic", sans-serif;
      cursor: pointer;
    }

    .contact-form button:hover {
      background: #ece9e6;
    }

    .note {
      max-width: 520px;
      margin: 0 auto 28px;
      color: var(--sub);
      font-size: 16px;
      text-align: left;
    }

.bottom-nav {
  margin-top: 110px;
  padding-top: 28px;
  border-top: 1px solid var(--line);
  text-align: center;
  font-size: 22px;
  line-height: 1.8;
  font-family: "KokuGothicLight", "Hiragino Sans", "Yu Gothic", sans-serif;
}

.bottom-nav a {
  color: var(--text);
  transition: color 0.2s ease;
}

.bottom-nav a:hover {
  color: var(--link-hover);
}

.bottom-nav .separator {
  margin: 0 10px;
}
    
      .page-title {
        font-size: 30px;
        margin-bottom: 28px;
      }

      .contact-form label {
        font-size: 18px;
      }

      .contact-form input,
      .contact-form textarea {
        font-size: 16px;
      }

      .contact-form button {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <h1 class="page-title">問い合わせ</h1>

    <p class="note">
      ご感想やご連絡などがありましたら、こちらからお送りください。
    </p>

    <form class="contact-form" action="https://formspree.io/f/mbdzvzjv" method="POST">
      <label>
        お名前
        <input type="text" name="name" required>
      </label>

      <label>
        メールアドレス
        <input type="email" name="email" required>
      </label>

      <label>
        お問い合わせ内容
        <textarea name="message" rows="6" required></textarea>
      </label>

      <button type="submit">送信</button>
    </form>

  <a href="index.html">Top</a>
  <span class="separator">/</span>
  <a href="eden/eden.html">EDEN</a>
  <span class="separator">/</span>
  <a href="published.html">Game</a>
  <span class="separator">/</span>
  <a href="guide.html">攻略</a>
  <span class="separator">/</span>
  <a href="contact.html">問い合わせ</a>
</nav>
  </div>
</body>
</html>
