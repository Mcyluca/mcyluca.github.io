    :root {
      --bg: #efefef;

      --line: #2f2b28;
      --link-hover: #7a726b;

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Yu Gothic", "YuGothic", sans-serif;
      line-height: 1.9;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 980px;

      max-width: 840px;

    }

.notice {
  margin: 0 0 36px;
  text-align: center;
  font-size: 18px;
  color: var(--text);
}

.guide-panel {
  max-width: 760px;
  margin: 0 auto;
  border: 1px solid var(--line);
  background: transparent;
}

.guide-panel-title {
  margin: 0;
  padding: 14px 18px;
  text-align: center;
  font-size: 22px;
  font-weight: 400;
  color: var(--text);
  border-bottom: 1px solid var(--line);
  line-height: 1.4;
}

.guide-row {
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 64px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--line);
}

.guide-row:last-child {
  border-bottom: none;
}

.guide-label {
  font-size: 22px;
  line-height: 1.25;
  letter-spacing: 0.01em;
  color: var(--text);
  flex-shrink: 0;
}

.badge-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.badge {
  width: 30px;
  height: 30px;
  border: 1px solid var(--line);
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  line-height: 1;
  color: var(--text);
  transition: opacity 0.2s ease, color 0.2s ease;
  flex-shrink: 0;
}

.guide-row a:hover,
.badge:hover {
  opacity: 0.7;
  color: var(--link-hover);
}

.sub-links {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 18px;
  line-height: 1.5;
}

.sub-links a {
  color: var(--text);
  transition: opacity 0.2s ease, color 0.2s ease;
}

.sub-links a:hover {
  opacity: 0.7;
  color: var(--link-hover);
}

    .guide-row a:hover,
    .badge:hover {
      opacity: 0.7;
      color: var(--link-hover);
    }

    .bottom-nav {
      margin-top: 110px;
      padding-top: 28px;
      border-top: 1px solid #bfb8b2;
      text-align: center;
      font-size: 22px;
      line-height: 1.8;
      font-family: "KokuGothicLight", "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    .bottom-nav a {
      color: var(--text);
      transition: color 0.2s ease;
    }

    .bottom-nav a:hover {
      color: var(--link-hover);
    }

    .separator {
      margin: 0 10px;
      color: var(--sub);
    }

    @media (max-width: 768px) {
      .container {
        padding: 28px 18px 80px;
      }

      .notice {
        font-size: 22px;
        margin-bottom: 40px;
      }

      .guide-panel-title {
        font-size: 24px;
        padding: 16px 18px;
      }

      .guide-row {
        min-height: 88px;
        padding: 16px 18px;
        gap: 10px;
      }

      .guide-label {
        font-size: 25px;
      }

      .badge {
        width: 42px;
        height: 42px;
        font-size: 22px;
      }

      .bottom-nav {
        font-size: 18px;
      }
    }
