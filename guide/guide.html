<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>攻略 - 置き所</title>
  <style>
    @font-face {
      font-family: "KokuGothicLight";
      src: url("../font_1_kokugl_1.15_rls.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg: #efefef;
      --text: #2f2b28;
      --sub: #5a5450;
      --line: #2f2b28;
      --link-hover: #7a726b;
      --panel: #f4f4f4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Yu Gothic", "YuGothic", sans-serif;
      line-height: 1.9;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 28px 100px;
    }

    .guide-wrap {
      max-width: 840px;
      margin: 0 auto;
    }

    .notice {
      margin: 0 0 36px;
      text-align: center;
      font-size: 18px;
      color: var(--text);
    }

    .guide-panel {
      max-width: 760px;
      margin: 0 auto;
      border: 1px solid var(--line);
      background: transparent;
    }

    .guide-panel-title {
      margin: 0;
      padding: 14px 18px;
      text-align: center;
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
      border-bottom: 1px solid var(--line);
      line-height: 1.4;
    }

.guide-image {
  border-bottom: 1px solid var(--line);
  overflow: hidden;
  text-align: center;
  padding: 20px 0;
}

.guide-image a {
  display: block;
  width: 100%;
}

.guide-image img {
  display: inline-block;
  width: 60%;
  max-width: 460px;
  height: auto;
  object-fit: contain;
}

    .guide-grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--line);
    }

    .guide-grid-last {
      border-bottom: none;
    }

    .guide-row-single {
      border-bottom: 1px solid var(--line);
    }

    .guide-cell {
      min-height: 64px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 22px;
      line-height: 1.5;
      color: var(--text);
      transition: opacity 0.2s ease, color 0.2s ease;
    }

    .guide-grid-two .guide-cell:first-child {
      border-right: 1px solid var(--line);
    }

.guide-cell a:hover,
.sub-links a:hover,
.badge:hover {
  opacity: 0.7;
  color: var(--link-hover);
}

  .guide-cell a {
  color: var(--text);
  text-decoration: none;
  transition: opacity 0.2s ease, color 0.2s ease;
}  

    .guide-cell-single {
      width: 100%;
    }

    .guide-cell-branch {
      gap: 12px;
      flex-wrap: wrap;
    }

    .guide-label {
      font-size: 22px;
      line-height: 1.4;
      color: var(--text);
    }

    .badge-group {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      width: 30px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      line-height: 1;
      color: var(--text);
      flex-shrink: 0;
      transition: opacity 0.2s ease, color 0.2s ease;
    }

    .sub-links {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 18px;
      line-height: 1.5;
    }

    .sub-links a {
      color: var(--text);
      transition: opacity 0.2s ease, color 0.2s ease;
    }

    .slash {
      color: var(--text);
    }

    .outside-links {
      max-width: 760px;
      margin: 18px auto 0;
      display: grid;
      gap: 12px;
    }

    .outside-link {
      border: 1px solid var(--line);
      padding: 16px 18px;
      text-align: center;
      font-size: 20px;
      line-height: 1.5;
      transition: opacity 0.2s ease, color 0.2s ease;
    }

    .outside-link:hover {
      opacity: 0.7;
      color: var(--link-hover);
    }

    .bottom-nav {
      margin-top: 110px;
      padding-top: 28px;
      border-top: 1px solid #bfb8b2;
      text-align: center;
      font-size: 22px;
      line-height: 1.8;
      font-family: "KokuGothicLight", "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    .bottom-nav a {
      color: var(--text);
      transition: color 0.2s ease;
    }

    .bottom-nav a:hover {
      color: var(--link-hover);
    }

    .separator {
      margin: 0 10px;
      color: var(--sub);
    }

    @media (max-width: 768px) {
      .container {
        padding: 28px 18px 80px;
      }

      .notice {
        font-size: 20px;
        margin-bottom: 34px;
      }

      .guide-panel-title {
        font-size: 24px;
        padding: 16px 18px;
      }

      .guide-grid-two {
        grid-template-columns: 1fr;
      }

      .guide-grid-two .guide-cell:first-child {
        border-right: none;
        border-bottom: 1px solid var(--line);
      }

      .guide-cell {
        min-height: 82px;
        font-size: 24px;
        padding: 16px 18px;
      }

      .guide-label {
        font-size: 24px;
      }

      .badge {
        width: 40px;
        height: 40px;
        font-size: 21px;
      }

      .sub-links {
        font-size: 20px;
      }

      .outside-link {
        font-size: 19px;
      }

      .bottom-nav {
        font-size: 18px;
      }
    }
  </style>
</head>
