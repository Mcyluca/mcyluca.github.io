<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>攻略 - 置き所</title>
  <style>
    @font-face {
      font-family: "KokuGothicLight";
      src: url("../font_1_kokugl_1.15_rls.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg: #efefef;
      --text: #2f2b28;
      --sub: #5a5450;
      --line: #2f2b28;
      --link-hover: #7a726b;
      --panel: #f4f4f4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Yu Gothic", "YuGothic", sans-serif;
      line-height: 1.9;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 28px 100px;
    }

    .guide-wrap {
      max-width: 840px;
      margin: 0 auto;
    }

    .notice {
      margin: 0 0 36px;
      text-align: center;
      font-size: 18px;
      color: var(--text);
    }

    /* 作品ごとの大きなブロック */
    .guide-block {
      max-width: 760px;
      margin: 0 auto;
      border: 1px solid var(--line);
      background: transparent;
    }

    .guide-block + .guide-block {
      margin-top: 48px;
    }

    .guide-title {
      margin: 0;
      padding: 18px 20px;
      text-align: center;
      font-size: 22px;
      font-weight: 400;
      border-bottom: 1px solid var(--line);
      line-height: 1.4;
    }

    .guide-image {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 170px;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }

    .guide-image a,
    .guide-image img {
      display: block;
      width: 100%;
    }

    .guide-image img {
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    /* 2列の短い攻略 */
    .guide-short-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--line);
    }

    .guide-short-item {
      min-height: 88px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 20px;
      line-height: 1.6;
      transition: opacity 0.2s ease, color 0.2s ease;
    }

    .guide-short-item:first-child {
      border-right: 1px solid var(--line);
    }

    .guide-short-item:hover {
      opacity: 0.7;
      color: var(--link-hover);
    }

    /* 分岐する攻略 */
    .guide-branch {
      padding: 18px 20px;
      text-align: center;
      border-bottom: 1px solid var(--line);
    }

    .guide-branch-title {
      font-size: 21px;
      line-height: 1.6;
    }

    .badge-group {
      display: inline-flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-left: 10px;
      vertical-align: middle;
    }

    .badge {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      line-height: 1;
      transition: opacity 0.2s ease, color 0.2s ease;
      flex-shrink: 0;
    }

    .badge:hover {
      opacity: 0.7;
      color: var(--link-hover);
    }

    /* 下に追加の行を入れたいとき用 */
    .guide-extra {
      min-height: 84px;
      border-bottom: 1px solid var(--line);
    }

    .guide-extra:last-child {
      border-bottom: none;
    }

    .bottom-nav {
      margin-top: 110px;
      padding-top: 28px;
      border-top: 1px solid #bfb8b2;
      text-align: center;
      font-size: 22px;
      line-height: 1.8;
      font-family: "KokuGothicLight", "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    .bottom-nav a {
      color: var(--text);
      transition: color 0.2s ease;
    }

    .bottom-nav a:hover {
      color: var(--link-hover);
    }

    .separator {
      margin: 0 10px;
      color: var(--sub);
    }

    @media (max-width: 768px) {
      .container {
        padding: 28px 18px 80px;
      }

      .notice {
        font-size: 20px;
        margin-bottom: 34px;
      }

      .guide-title {
        font-size: 24px;
        padding: 16px 16px;
      }

      .guide-image {
        min-height: 140px;
      }

      .guide-short-grid {
        grid-template-columns: 1fr;
      }

      .guide-short-item {
        min-height: 74px;
        font-size: 21px;
        padding: 14px 16px;
      }

      .guide-short-item:first-child {
        border-right: none;
        border-bottom: 1px solid var(--line);
      }

      .guide-branch {
        padding: 16px;
      }

      .guide-branch-title {
        font-size: 22px;
      }

      .badge {
        width: 40px;
        height: 40px;
        font-size: 21px;
      }

      .bottom-nav {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

        <div class="guide-branch">

        <div class="guide-branch">

        <div class="guide-short-grid">

      </section>
    </main>

  </div>
</body>
</html>
