<!DOCTYPE html>
<html lang="ja">
<head>

  <style>
    @font-face {
      font-family: "KokuGothicLight";
      src: url("../../font_1_kokugl_1.15_rls.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg: #efefef;
      --text: #2f2b28;
      --sub: #5a5450;
      --line: #cfc8c2;
      --line-soft: #ddd7d1;
      --panel: #f7f7f5;
      --link-hover: #7a726b;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      line-height: 1.8;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 36px 28px 100px;
    }

    .guide-wrap {
      max-width: 700px;
      margin: 0 auto;
    }

.page-range {
  margin: 0 0 18px;
  font-size: 34px;
  font-family: "KokuGothicLight", "Yu Gothic", sans-serif;
  color: var(--text);
  letter-spacing: 0.03em;
}

.title-line {
  width: 100%;
  height: 1px;
  background:#cfc8c2;
  margin: 0 0 28px;
}

.guide-keyvisual {
  margin: 0 0 24px;
}

.guide-keyvisual img {
  display: block;
  width: 100%;
  max-width: 700px;
  height: auto;
}

.page-note {
  margin: 0 0 20px;
  font-size: 14px;
  color: var(--sub);
}

    .page-title {
      margin: 0 0 18px;
      font-size: 52px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.03em;
    }

    .guide-lead {
      margin: 0 0 32px;
      font-size: 18px;
      color: var(--sub);
    }

    .guide-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
    }

    .guide-table tr {
      border-bottom: 1px solid var(--line-soft);
    }

    .guide-table tr:first-child {
      border-top: 1px solid var(--line-soft);
    }

    .step-num {
      width: 56px;
      padding: 16px 8px;
      text-align: center;
      vertical-align: top;
      font-size: 20px;
      color: var(--sub);
      border-right: 1px solid var(--line-soft);
      white-space: nowrap;
    }

    .step-text {
      padding: 16px 18px;
      font-size: 16px;
      color: var(--text);
    }

    .back-guide {
      margin-top: 56px;
      text-align: center;
      font-size: 18px;
      color: var(--sub);
    }

    .back-guide a {
      transition: color 0.2s ease;
    }

    .back-guide a:hover {
      color: var(--link-hover);
    }

    .bottom-nav {
      margin-top: 80px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
      text-align: center;
      font-size: 22px;
      line-height: 1.8;
      color: var(--text);
      font-family: "KokuGothicLight", "Yu Gothic", "Hiragino Sans", sans-serif;
    }

    .bottom-nav a {
      transition: color 0.2s ease;
    }

    .bottom-nav a:hover {
      color: var(--link-hover);
    }

    .separator {
      margin: 0 10px;
      color: var(--sub);
    }

    @media (max-width: 768px) {
      .container {
        padding: 28px 18px 80px;
      }

      .page-range {
        margin-bottom: 28px;
        font-size: 24px;
      }

      .page-title {
        font-size: 36px;
      }

      .guide-lead {
        margin-bottom: 24px;
        font-size: 16px;
      }

      .step-num {
        width: 48px;
        font-size: 18px;
        padding: 14px 6px;
      }

      .step-text {
        padding: 14px 14px;
        font-size: 15px;
      }

      .bottom-nav {
        font-size: 18px;
      }
    }
