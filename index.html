<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>置き所</title>
  <style>
    @font-face {
  font-family: "KokuGothicLight";
  src: url("font_1_kokugl_1.15_rls.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
}
    :root {
      --bg: #efefef;
      --text: #2f2b28;
      --sub: #5a5450;
      --accent: #eeb083;
      --accent-hover: #e3a06f;
      --line: #d8d3ce;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Yu Gothic", "YuGothic", sans-serif;
      line-height: 1.8;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 100px 28px 100px;
    }

    .hero-link {
      display: block;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
    }

   .hero-image {
  width: 100%;
  aspect-ratio: 16 / 4;
  overflow: hidden;
  background: var(--accent);
  transition: transform 0.2s ease;
}

.hero-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 35%;
  display: block;
}

.hero-link:hover .hero-image {
  transform: translateY(-2px);
}

    .menu {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 18px;
      margin: 32px 0 110px;
      font-size: 35px;
      line-height: 1.6;
      font-family: "KokuGothicLight", "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    .menu a {
      display: inline-block;
      padding: 0 2px;
    }

    .separator {
      color: var(--sub);
    }

    .updates {
      max-width: 520px;
      margin: 0 auto;
      text-align: center;
    }

    .updates h2 {
      font-size: 32px;
      font-weight: 400;
      margin: 0 0 10px;
      letter-spacing: 0.08em;
      font-family: "KokuGothicLight", "Hiragino Sans", "Yu Gothic", sans-serif;
    }

.update-box {
  max-width: 520px;
  height: 110px;
  margin: 18px auto 0;
  padding: 14px 18px;
  border: 1px solid #bfb8b2;
  background: #f4f4f4;
  overflow-y: auto;
  text-align: left;
}

.update-list {
  margin: 0;
  padding: 0;
  list-style: none;
  font-size: 22px;
}

.update-list li {
  margin-top: 0;
  padding-left: 0;
}

    .update-date {
      color: var(--sub);
      margin-right: 0.5em;
      font-size: 0.9em;
    }

    .footer {
      margin-top: 100px;
      text-align: center;
      color: var(--sub);
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .container {
        padding: 18px 18px 72px;
      }

      .hero-image {
        font-size: 22px;
        aspect-ratio: 16 / 5;
      }

      .menu {
        margin: 28px 0 80px;
        gap: 12px;
        font-size: 20px;
      }

      .updates h2 {
        font-size: 28px;
      }

      .update-list {
        font-size: 18px;
      }
    }

    @media (max-width: 480px) {

      .menu {
        font-size: 18px;
        gap: 10px;
      }

      .updates h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

  <a class="hero-link" href="#eden" aria-label="EDENページへ">
  <div class="hero-image">
    <img src="eden-tower.png" alt="EDEN TOWER" />
  </div>
</a>

    <nav class="menu" aria-label="メニュー">
      <a href="#news">お知らせ</a>
      <span class="separator">/</span>
      <a href="#published">公開中</a>
      <span class="separator">/</span>
      <a href="#guide">攻略</a>
      <span class="separator">/</span>
      <a href="#contact">問い合わせ</a>
    </nav>

  <section class="updates" id="news">
  <h2>更新履歴</h2>
  <div class="update-box">
    <ul class="update-list">
      <li>2026/03/23　サイト公開</li>
    </ul>
  </div>
</section>

    <div class="footer">© 置き所</div>
  </div>
</body>
</html>
