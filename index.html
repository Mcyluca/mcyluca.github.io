<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>置き所</title>
  <style>
    @font-face {
  font-family: "KokuGothicLight";
  src: url("font_1_kokugl_1.15_rls.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
}
    :root {
      --bg: #efefef;
      --text: #2f2b28;
      --sub: #5a5450;
      --accent: #eeb083;
      --accent-hover: #e3a06f;
      --line: #d8d3ce;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS PMincho", serif;
      line-height: 1.8;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 100px 28px 100px;
    }

    .hero-link {
      display: block;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
    }

   .hero-image {
  width: 100%;
  aspect-ratio: 16 / 4;
  overflow: hidden;
  background: var(--accent);
  transition: transform 0.2s ease;
}

.hero-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 35%;
  display: block;
}

.hero-link:hover .hero-image {
  transform: translateY(-2px);
}

    .menu {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 18px;
      margin: 36px 0 110px;
      font-size: 32px;
      line-height: 1.6;
      font-family: "KokuGothicLight", "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    .menu a {
      display: inline-block;
      padding: 0 2px;
    }

    .separator {
      color: var(--sub);
    }

    .updates {
      max-width: 520px;
      margin: 0 auto;
      text-align: center;
    }

    .updates h2 {
      font-size: 32px;
      font-weight: 400;
      margin: 0 0 10px;
      letter-spacing: 0.08em;
    }

    .update-list {
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 22px;
    }

    .update-list li {
      margin-top: 8px;
    }

    .update-date {
      color: var(--sub);
      margin-right: 0.5em;
      font-size: 0.9em;
    }

    .footer {
      margin-top: 100px;
      text-align: center;
      color: var(--sub);
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .container {
        padding: 18px 18px 72px;
      }

      .hero-image {
        font-size: 22px;
        aspect-ratio: 16 / 5;
      }

      .menu {
        margin: 28px 0 80px;
        gap: 12px;
        font-size: 20px;
      }

      .updates h2 {
        font-size: 28px;
      }

      .update-list {
        font-size: 18px;
      }
    }

    @media (max-width: 480px) {

      .menu {
        font-size: 18px;
        gap: 10px;
      }

      .updates h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

  <a class="hero-link" href="#eden" aria-label="EDENページへ">
  <div class="hero-image">
    <img src="eden-tower.png" alt="EDEN TOWER" />
  </div>
</a>

    <nav class="menu" aria-label="メニュー">
      <a href="#news">お知らせ</a>
      <span class="separator">/</span>
      <a href="#published">公開中</a>
      <span class="separator">/</span>
      <a href="#guide">攻略</a>
      <span class="separator">/</span>
      <a href="#contact">問い合わせ</a>
    </nav>

    <section class="updates" id="news">
      <h2>更新情報</h2>
      <ul class="update-list">
        <li>・ここに直に表示</li>
      </ul>
    </section>

    <section id="published" style="margin-top: 120px;">
      <h2 style="text-align:center; font-size:32px; font-weight:400; letter-spacing:0.08em; margin-bottom:20px;">公開中</h2>
      <div style="max-width:700px; margin:0 auto; text-align:center; color:var(--sub); font-size:20px;">
        現在公開中のコンテンツをここに載せていく予定です。
      </div>
    </section>

    <section id="eden" style="margin-top: 120px;">
      <h2 style="text-align:center; font-size:32px; font-weight:400; letter-spacing:0.08em; margin-bottom:20px;">EDEN</h2>
      <div style="max-width:700px; margin:0 auto; text-align:center; color:var(--sub); font-size:20px;">
        ゲーム紹介や公開予定などを、ここから追加していく予定です。
      </div>
    </section>

    <section id="guide" style="margin-top: 120px;">
      <h2 style="text-align:center; font-size:32px; font-weight:400; letter-spacing:0.08em; margin-bottom:20px;">攻略</h2>
      <div style="max-width:700px; margin:0 auto; text-align:center; color:var(--sub); font-size:20px;">
        攻略ページへの入口をここにまとめていく予定です。
      </div>
    </section>

    <section id="contact" style="margin-top: 120px;">
      <h2 style="text-align:center; font-size:32px; font-weight:400; letter-spacing:0.08em; margin-bottom:20px;">問い合わせ</h2>
      <div style="max-width:700px; margin:0 auto; text-align:center; color:var(--sub); font-size:20px;">
        問い合わせ先や連絡方法をここに載せる予定です。
      </div>
    </section>

    <div class="footer">© 置き所</div>
  </div>
</body>
</html>
