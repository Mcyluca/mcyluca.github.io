<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDEN CHARACTER</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
    }

    .eden-menu {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .eden-menu a {
      color: #fff;
      text-decoration: none;
      display: block;
      padding: 18px 24px;
      font-size: 1.15rem;
      letter-spacing: 0.12em;
      transition: background 0.25s ease, opacity 0.25s ease;
    }

    .eden-menu a:hover {
      background: rgba(255, 255, 255, 0.08);
      opacity: 0.95;
    }

    .character-visual {
      position: relative;
      width: 100%;
      line-height: 0;
    }

    .character-visual > img {
      display: block;
      width: 100%;
      height: auto;
    }

    .character-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 120px;
      padding-left: 24px;
      padding-right: 24px;
    }

    .character-box {
      width: min(100%, 980px);
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 48px 40px;
      line-height: normal;
    }

    .page-title {
      font-size: 2rem;
      letter-spacing: 0.12em;
      margin-bottom: 32px;
      text-align: center;
    }

    .route-section + .route-section {
      margin-top: 28px;
    }

    .route-box {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 24px 24px 28px;
    }

    .route-title {
      font-size: 1.2rem;
      letter-spacing: 0.08em;
      margin-bottom: 18px;
    }

    .thumb-list {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
    }

    .thumb-btn {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.04);
      padding: 0;
      cursor: pointer;
      width: 120px;
      transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }

    .thumb-btn:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.08);
    }

    .thumb-btn img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 24px;
      z-index: 300;
    }

    .modal.is-open {
      display: flex;
    }

    .modal-panel {
      width: min(100%, 960px);
      max-height: min(88vh, 900px);
      overflow: auto;
      background: rgba(10, 10, 10, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
      position: relative;
      padding: 36px 32px;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
    }

    .modal-content {
      display: grid;
      grid-template-columns: minmax(240px, 360px) 1fr;
      gap: 28px;
      align-items: start;
    }

    .modal-image img {
      display: block;
      width: 100%;
      height: auto;
      background: rgba(255, 255, 255, 0.03);
    }

    .modal-text h2 {
      font-size: 1.6rem;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    .modal-route {
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.72);
      margin-bottom: 20px;
    }

    .modal-description {
      font-size: 1rem;
      line-height: 2;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.94);
    }

      .character-box {
        padding: 36px 28px;
      }

      .modal-content {
        grid-template-columns: 1fr;
      }

      .modal-image {
        max-width: 340px;
        margin: 0 auto;
      }
    }

      .eden-menu a {
        padding: 14px 14px;
        font-size: 0.88rem;
        letter-spacing: 0.08em;
      }

      .character-overlay {
        padding-top: 40px;
        padding-left: 16px;
        padding-right: 16px;
      }

      .character-box {
        padding: 24px 18px;
      }

      .page-title {
        font-size: 1.5rem;
        margin-bottom: 24px;
      }

      .route-box {
        padding: 18px 16px 22px;
      }

      .route-title {
        font-size: 1.05rem;
      }

      .thumb-list {
        gap: 14px;
      }

      .thumb-btn {
        width: 100px;
      }

      .modal {
        padding: 14px;
      }

      .modal-panel {
        padding: 28px 18px 20px;
      }

      .modal-text h2 {
        font-size: 1.3rem;
      }

      .modal-description {
        font-size: 0.94rem;
        line-height: 1.9;
      }
    }
  </style>
</head>
<body>
  <nav class="eden-menu">
    <a href="index.html">Home</a>
    <a href="eden-top.html">Top</a>
    <a href="eden-story.html">Story</a>
    <a href="eden-character.html">Character</a>
    <a href="eden-word.html">Word</a>
    <a href="eden-credit.html">Credit</a>
  </nav>

  <section class="character-visual">
    <img src="images/e-tower2.png" alt="雨のEDENタワー">

    <div class="character-overlay">
      <div class="character-box">
        <h1 class="page-title">Character</h1>

        <section class="route-section">
          <div class="route-box">
            <h2 class="route-title">ルートA</h2>
            <div class="thumb-list">
              <button
                class="thumb-btn"
                type="button"
                data-name="ノア"
                data-image="noa-t.png"
                data-description="ここにノアの紹介文を入れる。"
              >
                <img src="noa-s.png" alt="ノア">
              </button>
            </div>
          </div>
        </section>

        <section class="route-section">
          <div class="route-box">
            <h2 class="route-title">ルートF</h2>
            <div class="thumb-list">
              <button
                class="thumb-btn"
                type="button"
                data-name="レイ"
                data-image="rei-t.png"
                data-description="ここにレイの紹介文を入れる。"
              >
                <img src="rei-s.png" alt="レイ">
              </button>
            </div>
          </div>
        </section>

        <section class="route-section">
          <div class="route-box">
            <h2 class="route-title">ルートB</h2>
            <div class="thumb-list">
              <button
                class="thumb-btn"
                type="button"
                data-name="イヴ"
                data-image="eve-t.png"
                data-description="ここにイヴの紹介文を入れる。"
              >
                <img src="eve-s.png" alt="イヴ">
              </button>
            </div>
          </div>
        </section>

      </div>
    </div>
  </section>

  <div class="modal" id="characterModal">
    <div class="modal-panel">
      <button class="modal-close" id="modalClose" type="button" aria-label="閉じる">×</button>

      <div class="modal-content">
        <div class="modal-image">
          <img id="modalImage" src="" alt="">
        </div>

        <div class="modal-text">
          <h2 id="modalName">キャラクター名</h2>
          <p class="modal-description" id="modalDescription">ここに説明が入る。</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const modal = document.getElementById("characterModal");
    const modalClose = document.getElementById("modalClose");
    const modalImage = document.getElementById("modalImage");
    const modalName = document.getElementById("modalName");
    const modalDescription = document.getElementById("modalDescription");
    const thumbButtons = document.querySelectorAll(".thumb-btn");

    thumbButtons.forEach((button) => {
      button.addEventListener("click", () => {
        modalImage.src = button.dataset.image;
        modalImage.alt = button.dataset.name;
        modalName.textContent = button.dataset.name;
        modalDescription.textContent = button.dataset.description;
        modal.classList.add("is-open");
      });
    });

    modalClose.addEventListener("click", () => {
      modal.classList.remove("is-open");
    });

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        modal.classList.remove("is-open");
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        modal.classList.remove("is-open");
      }
    });
  </script>
</body>
</html>
