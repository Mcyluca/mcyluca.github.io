    @font-face {

    :root {
      --bg: #efefef;

    * {

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Yu Gothic", "YuGothic", sans-serif;
      line-height: 1.9;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 28px 100px;
    }

    .works {
      max-width: 840px;
      margin: 0 auto;
    }

    .work-item + .work-item {
      margin-top: 72px;
    }

    .work-title {
      margin: 0;
      font-size: 38px;
      font-weight: 400;
      color: var(--text);
    }

    .work-sub {
      margin-top: 10px;
      font-size: 22px;
      color: var(--sub);
    }

    .work-desc {
      margin-top: 18px;
      font-size: 22px;
      color: var(--text);
    }

    .work-links {
      margin-top: 28px;
      font-size: 22px;
      color: var(--link);
    }

    .work-links a {
  color: var(--link);
  text-decoration: underline;
  text-underline-offset: 0.16em;
  text-decoration-thickness: 1px;
  transition: color 0.2s ease, opacity 0.2s ease;
}

.work-links a:hover {
  color: var(--link-hover);
  opacity: 0.75;
}

.work-summary {
  margin-top: 22px;
  display: flex;
  align-items: flex-start;
  gap: 28px;
}

.work-thumb {
  width: 320px;
  height: 180px;
  object-fit: cover;
  display: block;
  flex-shrink: 0;
}

.work-text {
  font-size: 20px;
  color: var(--sub);
  line-height: 1.9;
}

    .separator {
      margin: 0 22px;
      color: var(--sub);
    }

    .bottom-nav {
      margin-top: 110px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
      text-align: center;
      font-size: 22px;
      line-height: 1.8;
      font-family: "KokuGothicLight", "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    .bottom-nav a {
      color: var(--text);
      transition: color 0.2s ease;
    }

    .bottom-nav a:hover {
      color: var(--link-hover);
    }

    .bottom-nav .separator {
      margin: 0 10px;
    }
