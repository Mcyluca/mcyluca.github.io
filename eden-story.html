<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDEN STORY</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @font-face {
      font-family: "KokuGothicLight";
      src: url("font_1_kokugl_1.15_rls.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    body {
      background: #000;
      color: #fff;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
    }

    .eden-menu {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .eden-menu a {
      color: #fff;
      text-decoration: none;
      display: block;
      padding: 18px 24px;
      font-size: 1.15rem;
      letter-spacing: 0.12em;
      transition: background 0.25s ease, opacity 0.25s ease;
    }

    .eden-menu a:hover {
      background: rgba(255, 255, 255, 0.08);
      opacity: 0.95;
    }

    .story-visual {
      position: relative;
      width: 100%;
      line-height: 0;
    }

    .story-visual img {
      display: block;
      width: 100%;
      height: auto;
    }

    .story-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 120px;
      padding-left: 24px;
      padding-right: 24px;
    }

    .story-box {
      width: min(100%, 980px);
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 48px 40px;
      line-height: normal;
    }

    .page-title {
      font-size: 2rem;
      letter-spacing: 0.12em;
      margin-bottom: 32px;
      text-align: center;
    }

    .story-text {
      font-size: 1rem;
      line-height: 2.2;
      letter-spacing: 0.06em;
    }

    .story-text p + p {
      margin-top: 1.6em;
    }

    @media screen and (max-width: 900px) {
      .story-overlay {
        padding-top: 80px;
      }

      .story-box {
        padding: 36px 28px;
      }
    }

    @media screen and (max-width: 600px) {
      .eden-menu {
        justify-content: flex-start;
      }

      .eden-menu a {
        padding: 14px 14px;
        font-size: 0.88rem;
        letter-spacing: 0.08em;
      }

      .story-overlay {
        padding-top: 40px;
        padding-left: 16px;
        padding-right: 16px;
      }

      .story-box {
        padding: 24px 18px;
      }

      .page-title {
        font-size: 1.5rem;
        margin-bottom: 24px;
      }

      .story-text {
        font-size: 0.95rem;
        line-height: 2;
      }
    }
  </style>
</head>
<body>
  <nav class="eden-menu">
    <a href="index.html">Home</a>
    <a href="eden-top.html">Top</a>
    <a href="eden-story.html">Story</a>
    <a href="eden-character.html">Character</a>
    <a href="eden-word.html">Word</a>
    <a href="eden-credit.html">Credit</a>
  </nav>

  <section class="story-visual">
    <img src="e-tower2.png" alt="雨のEDENタワー">

    <div class="story-overlay">
      <div class="story-box">
        <h1 class="page-title">Story</h1>
        <div class="story-text">
          <p>
            ここにあらすじを入れる。
          </p>
          <p>
            長く降り続く雨に閉ざされた世界。<br>
            その中で、人は楽園を夢見ていた。
          </p>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
