<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDEN TOP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
    }

    .container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      background: #000;
    }

    .eden-menu {
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0;
      border-bottom: 1px solid #222;
    }

    .eden-menu a {
      color: #fff;
      text-decoration: none;
      padding: 14px 18px;
      display: block;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      transition: background 0.3s ease;
    }

    .eden-menu a:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .tower-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    @media screen and (max-width: 600px) {
      .eden-menu {
        justify-content: flex-start;
      }

      .eden-menu a {
        padding: 12px 14px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="eden-menu">
      <a href="index.html">Home</a>
      <a href="eden-top.html">Top</a>
      <a href="eden-story.html">Story</a>
      <a href="eden-character.html">Character</a>
      <a href="eden-word.html">Word</a>
    </nav>

    <div class="tower-image">
      <img src="e-tower2.png" alt="雨のEDENタワー">
    </div>
  </div>
</body>
</html>
